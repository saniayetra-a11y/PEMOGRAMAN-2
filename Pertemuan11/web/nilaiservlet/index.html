<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Hitung Nilai (Servlet)</title>
    </head>
    <body>
        <h3>Menghitung Nilai</h3>
        <form method="post" action="/Pertemuan11/HitungNilai">
            <table>
                <tr>
                    <td>Jumlah hadir</td>
                    <td><input type="text" name="jumlahHadir" /></td>
                </tr>
                <tr>
                    <td>Jumlah pertemuan</td>
                    <td><input type="text" name="jumlahPertemuan" /></td>
                </tr>
                <tr>
                    <td>Nilai tugas</td>
                    <td><input type="text" name="nilaiTugas" /></td>
                </tr>
                <tr>
                    <td>Nilai UTS</td>
                    <td><input type="text" name="nilaiUTS" /></td>
                </tr>
                <tr>
                    <td>Nilai UAS</td>
                    <td><input type="text" name="nilaiUAS" /></td>
                </tr>
                <tr>
                    <td>Nilai Akhir</td>
                    <td><input type="text" readonly /></td>
                </tr>
                <tr>
                    <td>Grade</td>
                    <td><input type="text" readonly /></td>
                </tr>
                <tr>
                    <td>Status</td>
                    <td><input type="text" readonly /></td>
                </tr>
            </table>
            <br>
            <input type="submit" value="Hitung" />
        </form>
        <br><a href="/Pertemuan11/index.html">Kembali ke Menu</a>
    </body>
</html>
